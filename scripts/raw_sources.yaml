# Phase 1 raw-data source registry.
#
# `sources:` — active list. `fetch_raw.py` iterates this and downloads each
# entry. Adding a source = one new list item. Removing = delete the item
# (the file and manifest row stay as historical record).
#
# `todo:` — sources the plan requires but for which the URL is behind a scrape,
# an API with auth, a variable filename, or otherwise not a static GET. These
# are NOT fetched; they exist as a checklist to be resolved incrementally.
#
# Per-source fields:
#   pull_id      — stable short id, also used for manifest row and idempotency
#   source_name  — human-readable
#   url          — the GET target
#   local_path   — repo-relative destination; parent dirs are created
#   notes        — free-form; shows up in the manifest row
#
# URL confidence: the SPC trio follow a well-established naming pattern on
# spc.noaa.gov/wcm/data/. If the year-range tail drifts (e.g., 1950-2024),
# the runner will report a 404 and you update the YAML.

sources:
  - pull_id: spc_tornado_1950_2024
    source_name: NOAA SPC tornado database
    url: https://www.spc.noaa.gov/wcm/data/1950-2024_actual_tornadoes.csv
    local_path: data/raw/spc/1950-2024_actual_tornadoes.csv
    notes: "§1.2 H_reported input; tornado touchdowns with EF rating"

  - pull_id: spc_hail_1955_2024
    source_name: NOAA SPC hail reports
    url: https://www.spc.noaa.gov/wcm/data/1955-2024_hail.csv
    local_path: data/raw/spc/1955-2024_hail.csv
    notes: "§1.2 H_reported input; hail reports (diameter in inches)"

  - pull_id: spc_wind_1955_2024
    source_name: NOAA SPC wind reports
    url: https://www.spc.noaa.gov/wcm/data/1955-2024_wind.csv
    local_path: data/raw/spc/1955-2024_wind.csv
    notes: "§1.2 H_reported input; damaging-wind reports"

